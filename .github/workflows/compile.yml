name: Compile LaTeX
on: [push]

jobs:
  container:
    runs-on: ubuntu-latest
    container: kjarosh/latex:2025.1-full
    steps:
      - name: Checkout repository
        # Upgraded to v5 to execute on the Node 24 runtime
        uses: actions/checkout@v5

      - name: Generate Date Suffix
        id: date
        run: echo "SUFFIX=$(date +'_%b%Y')" >> $GITHUB_ENV

      - name: Build using latexmk
        # Added -cd flag to prevent layout and font-tracking breakages
        run: |
          latexmk -pdfxe -cd -jobname=Michael_Woods${{ env.SUFFIX }} -interaction=nonstopmode -outdir=pdf -auxdir=aux resume_cv.tex

      - name: Upload document
        # Upgraded to v6 to execute on the Node 24 runtime
        uses: actions/upload-artifact@v6
        with:
          name: Michael_Woods${{ env.SUFFIX }}
          path: pdf/Michael_Woods${{ env.SUFFIX }}.pdf
