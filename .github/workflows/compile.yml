name: Compile LaTeX
on: [push]

jobs:
  container:
    runs-on: ubuntu-latest
    container: kjarosh/latex:2025.1-full
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate Date Suffix
        id: date
        run: echo "SUFFIX=$(date +'_%b%Y')" >> $GITHUB_ENV

      - name: Build PDF using latexmk
        run: |
          latexmk -pdfxe -cd -jobname=Michael_Woods${{ env.SUFFIX }} -interaction=nonstopmode -outdir=out -auxdir=aux resume_cv.tex

      - name: Install text tools on host runner
        run: |
          apk add --no-cache poppler-utils

      - name: Extract text from PDF
        # UPDATED: Outputs to the same name inside the pdf directory
        run: |
          pdftotext -layout out/Michael_Woods${{ env.SUFFIX }}.pdf out/Michael_Woods${{ env.SUFFIX }}.txt

      - name: Upload documents
        uses: actions/upload-artifact@v6
        with:
          name: Michael_Woods_Documents${{ env.SUFFIX }}
          path: |
            out/Michael_Woods${{ env.SUFFIX }}.pdf
            out/Michael_Woods${{ env.SUFFIX }}.txt
