name: Compile LaTeX
on: [push]

jobs:
  container:
    runs-on: ubuntu-latest
    container: kjarosh/latex:2025.1-full
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate Date Suffix
        id: date
        run: echo "SUFFIX=$(date +'_%b%Y')" >> $GITHUB_ENV

      - name: Build PDF using latexmk
        run: |
          latexmk -pdfxe -cd -jobname=Michael_Woods${{ env.SUFFIX }} -interaction=nonstopmode -outdir=pdf -auxdir=aux resume_cv.tex

      - name: Install text tools on host runner
        run: |
          apk add --no-cache poppler-utils

      - name: Extract text from PDF
        # UPDATED: Outputs to the same name inside the pdf directory
        run: |
          pdftotext -layout pdf/Michael_Woods${{ env.SUFFIX }}.pdf pdf/Michael_Woods${{ env.SUFFIX }}.txt

      - name: Upload PDF document
        uses: actions/upload-artifact@v6
        with:
          name: PDF-Document-${{ env.SUFFIX }}
          path: pdf/Michael_Woods${{ env.SUFFIX }}.pdf

      - name: Upload Text document
        uses: actions/upload-artifact@v6
        with:
          name: Text-Document-${{ env.SUFFIX }}
          # UPDATED: Matches the new path and filename pattern
          path: pdf/Michael_Woods${{ env.SUFFIX }}.txt
