services:
  latex-builder:
    build: .
    container_name: xelatex-compiler
    # Dynamically injects your local user and group IDs
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /src
    volumes:
      - ./:/src
    environment:
      - FILENAME=resume_cv
    command: >
      /bin/sh -c "
      SUFFIX=\$$(date +'_%b%Y') &&
      latexmk -pdfxe
      -cd
      -jobname=Michael_Woods\$$SUFFIX
      -interaction=nonstopmode
      -outdir=pdf
      -auxdir=aux
      resume_cv.tex
      "

  latex-watcher:
    image: kjarosh/latex:2025.1-full
    container_name: xelatex-watcher
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /src
    volumes:
      - ./:/src
    command: >
      /bin/sh -c "
      SUFFIX=\$$(date +'_%b%Y') &&
      latexmk -pdfxe
      -cd
      -jobname=Michael_Woods\$$SUFFIX
      -pvc
      -interaction=nonstopmode
      -outdir=pdf
      -auxdir=aux
      resume_cv.tex
      "
